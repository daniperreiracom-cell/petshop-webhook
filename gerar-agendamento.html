<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gerar Link de Agendamento - Pet Shop</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#eef5ff,#f2fff7);color:#1f2937}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:14px}
.card{width:100%;max-width:760px;background:#fff;border-radius:22px;box-shadow:0 14px 38px rgba(0,0,0,.12);overflow:hidden}
.hero{padding:22px;background:linear-gradient(135deg,#e7efff,#ecfff4);border-bottom:1px solid #e5e7eb}
.hero h1{margin:0 0 6px;font-size:28px}
.hero p{margin:0;color:#475569;font-size:14px}
.content{padding:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
label{font-size:14px;font-weight:700}
input{border:1px solid #d1d5db;border-radius:12px;padding:12px;font-size:15px}
input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;margin-top:18px;gap:10px}
button{border:0;border-radius:12px;padding:13px;font-weight:700;cursor:pointer}
.btn-primary{background:#2563eb;color:white}
.btn-copy{background:#e5e7eb}
.btn-whatsapp{background:#dcfce7;color:#166534}
.result{margin-top:22px;padding:16px;background:#f9fafb;border-radius:16px;border:1px solid #e5e7eb;display:none}
.result.show{display:block}
.status{font-weight:700;margin-bottom:10px}
.status.ok{color:#0f766e}
.status.error{color:#b91c1c}
.link-box{width:100%;min-height:90px;border:1px solid #d1d5db;border-radius:12px;padding:12px;margin-top:8px}
.big-open{
margin-top:14px;
display:block;
text-align:center;
padding:16px;
border-radius:14px;
font-weight:800;
background:#22c55e;
color:white;
text-decoration:none;
font-size:16px
}
.summary{margin-top:14px;background:white;border:1px dashed #d1d5db;border-radius:12px;padding:12px;font-size:14px}
@media(max-width:700px){
.grid{grid-template-columns:1fr}
.actions{grid-template-columns:1fr}
.hero h1{font-size:22px}
}
</style>
</head>
<body>
<div class="wrap">
<div class="card">

<div class="hero">
<h1>Gerar link de agendamento</h1>
<p>Preencha os dados e gere o link de pagamento para enviar ao cliente.</p>
</div>

<div class="content">

<form id="formAgendamento">

<div class="grid">

<div class="field">
<label>Nome do dono</label>
<input type="text" id="dono" required>
</div>

<div class="field">
<label>Telefone</label>
<input type="text" id="telefone" placeholder="11999999999">
</div>

<div class="field">
<label>Nome do pet</label>
<input type="text" id="pet" required>
</div>

<div class="field">
<label>Serviço</label>
<input type="text" id="servico" required>
</div>

<div class="field">
<label>Data</label>
<input type="date" id="data" required>
</div>

<div class="field">
<label>Hora</label>
<input type="time" id="hora" required>
</div>

<div class="field full">
<label>Valor</label>
<input type="number" id="valor" step="0.01" required>
</div>

</div>

<div class="actions">
<button class="btn-primary" type="submit" id="btnGerar">Gerar link</button>
<button type="button" class="btn-copy" id="btnCopiar" disabled>Copiar link</button>
<button type="button" class="btn-whatsapp" id="btnWhatsapp" disabled>Enviar WhatsApp</button>
</div>

</form>

<div class="result" id="resultado">

<div class="status" id="statusMensagem"></div>

<textarea id="linkGerado" class="link-box" readonly></textarea>

<a id="abrirPagamento" class="big-open" target="_blank" style="display:none">Abrir pagamento</a>

<div class="summary" id="resumo"></div>

</div>

</div>
</div>
</div>

<script>

const form=document.getElementById('formAgendamento')
const resultado=document.getElementById('resultado')
const statusMensagem=document.getElementById('statusMensagem')
const linkGerado=document.getElementById('linkGerado')
const btnCopiar=document.getElementById('btnCopiar')
const btnWhatsapp=document.getElementById('btnWhatsapp')
const abrirPagamento=document.getElementById('abrirPagamento')
const resumo=document.getElementById('resumo')

function dados(){
return{
dono:document.getElementById('dono').value.trim(),
telefone:document.getElementById('telefone').value.trim(),
pet:document.getElementById('pet').value.trim(),
servico:document.getElementById('servico').value.trim(),
data:document.getElementById('data').value,
hora:document.getElementById('hora').value,
valor:document.getElementById('valor').value
}
}

function resumoTexto(d){
return `Dono: ${d.dono}<br>Pet: ${d.pet}<br>Serviço: ${d.servico}<br>Data: ${d.data}<br>Hora: ${d.hora}<br>Valor: R$ ${d.valor}`
}

form.addEventListener('submit',async e=>{

 e.preventDefault()

 statusMensagem.innerText="Gerando link de pagamento..."
 statusMensagem.className="status"
 resultado.classList.add("show")

 const d=dados()

 try{

 const params=new URLSearchParams(d)

 const r=await fetch(`/gerar-link-petshop?${params.toString()}`)

 const j=await r.json()

 if(!r.ok) throw new Error(j.erro||"Erro ao gerar")

 linkGerado.value=j.link_pagamento

 abrirPagamento.href=j.link_pagamento
 abrirPagamento.style.display="block"

 btnCopiar.disabled=false
 btnWhatsapp.disabled=false

 statusMensagem.innerText="Link gerado com sucesso"
 statusMensagem.className="status ok"

 resumo.innerHTML=resumoTexto(d)

 }catch(err){

 statusMensagem.innerText=err.message
 statusMensagem.className="status error"

 }

})

btnCopiar.onclick=()=>{
navigator.clipboard.writeText(linkGerado.value)
statusMensagem.innerText="Link copiado"
}

btnWhatsapp.onclick=()=>{

const d=dados()
const link=linkGerado.value

let tel=d.telefone.replace(/\D/g,'')

let msg=`Agendamento confirmado:%0A%0APet: ${d.pet}%0AServiço: ${d.servico}%0AData: ${d.data}%0AHora: ${d.hora}%0AValor: R$ ${d.valor}%0A%0APagar:%0A${link}`

let url="https://wa.me/?text="+msg

if(tel) url=`https://wa.me/55${tel}?text=${msg}`

window.open(url,'_blank')

}

</script>

</body>
</html>
